<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" width="200" height="60">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- House Icon -->
  <g transform="translate(0, 10)">
    <path d="M15 25 L25 15 L35 25 L35 40 L15 40 Z" fill="url(#logoGradient)" stroke="url(#logoGradient)" stroke-width="1"/>
    <polygon points="20,25 25,20 30,25" fill="url(#logoGradient)"/>
    <rect x="18" y="30" width="4" height="4" fill="#fff" opacity="0.9"/>
    <rect x="26" y="30" width="4" height="4" fill="#fff" opacity="0.9"/>
    <rect x="22" y="35" width="6" height="3" fill="#fff" opacity="0.9"/>
  </g>

  <!-- Text -->
  <text x="50" y="25" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="url(#logoGradient)">MONACOAST</text>
  <text x="50" y="42" font-family="Arial, sans-serif" font-size="10" fill="#666">REAL ESTATE</text>
</svg>